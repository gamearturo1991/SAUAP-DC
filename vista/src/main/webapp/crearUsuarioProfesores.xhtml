<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>SAUAP - Crear Usuario Profesor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center;
                  background: #067a38; padding: 20px 30px; color: white; margin-bottom: 20px; }
        .header .brand { font-size: 42px; font-weight: 800; }
        .header .logo { height: 68px; }
        .title { text-align: center; font-size: 40px; font-weight: 700; margin: 20px 0; }
        .line { border-bottom: 2px solid #067a38; margin-bottom: 20px; }
        .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .nav a { background: #067a38; color: white; padding: 8px 18px; border-radius: 20px;
                 text-decoration: none; font-weight: 700; }
        .nav a.active { background: #0d5e29; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                padding: 30px; margin-bottom: 20px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 16px; }
        .field .ui-selectonemenu, .field .ui-inputtext, .field .ui-password {
            width: 100% !important; padding: 10px 12px !important; border: 1px solid #ddd !important;
            border-radius: 4px !important; font-size: 14px !important; }
        .actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn { border: 0 !important; padding: 12px 24px !important; border-radius: 4px !important;
               font-weight: 700 !important; cursor: pointer !important; }
        .btn-primary { background: #067a38 !important; color: white !important; }
        .btn-primary:hover { background: #0d5e29 !important; }
        .btn-secondary { background: #999 !important; color: white !important; }
        .btn-secondary:hover { background: #777 !important; }
        .info-box { background: #e8f5e9; border-left: 4px solid #067a38; padding: 15px;
                    margin-bottom: 20px; border-radius: 4px; }
        .info-box p { color: #333; font-size: 14px; margin: 0; }
    </style>
</h:head>

<h:body>
    <div class="header">
        <div class="brand">SAUAP</div>
        <h:graphicImage value="resources/uabcl.png" styleClass="logo" />
    </div>

    <div class="container">
        <div class="title">Crear Usuario para Profesor</div>
        <div class="line"></div>

        <div class="nav">
            <a href="asignaturas.xhtml">Asignaturas</a>
            <a href="profesores.xhtml">Profesores</a>
            <a href="asignaciones.xhtml">Asignacion Materias</a>
            <a class="active" href="crearUsuarioProfesores.xhtml">Crear Usuario</a>
            <h:form style="margin: 0;">
                <p:commandButton value="🚪 Cerrar Sesión"
                                 action="#{loginUI.logout()}"
                                 ajax="false"
                                 style="background:#9a1f1f;color:#fff;border:0;padding:8px 18px;border-radius:20px;text-decoration:none;font-weight:700" />
            </h:form>
        </div>

        <div class="info-box">
            <p>📝 Selecciona un profesor y crea su usuario de acceso al sistema con nombre de usuario y contraseña.</p>
        </div>

        <div class="card">
            <h:form id="formCrearUsuario">
                <p:messages id="messages" showDetail="true" closable="true" />

                <div class="field">
                    <label for="profesor">Profesor *</label>
                    <p:selectOneMenu id="profesor" value="#{crearUsuarioProfesoresUI.profesorSeleccionado}">
                        <f:selectItems value="#{crearUsuarioProfesoresUI.profesores}"
                                       var="p"
                                       itemValue="#{p}"
                                       itemLabel="#{p.idPersona.nombre} #{p.idPersona.apellidoPaterno} (RFC: #{p.rfc})" />
                    </p:selectOneMenu>
                </div>

                <div class="field">
                    <label for="nombreUsuario">Nombre de Usuario *</label>
                    <p:inputText id="nombreUsuario"
                                 value="#{crearUsuarioProfesoresUI.nombreUsuario}"
                                 placeholder="Ej: profesor.juan" />
                </div>

                <div class="field">
                    <label for="contrasena">Contraseña *</label>
                    <p:password id="contrasena"
                                value="#{crearUsuarioProfesoresUI.contrasena}"
                                placeholder="Mínimo 6 caracteres"
                                feedback="false" />
                </div>

                <div class="field">
                    <label for="contrasenaConfirm">Confirmar Contraseña *</label>
                    <p:password id="contrasenaConfirm"
                                value="#{crearUsuarioProfesoresUI.contrasenaConfirm}"
                                placeholder="Repite la contraseña"
                                feedback="false" />
                </div>

                <div class="actions">
                    <p:commandButton value="Crear Usuario"
                                     styleClass="btn btn-primary"
                                     action="#{crearUsuarioProfesoresUI.guardarUsuario()}"
                                     update="formCrearUsuario" />
                    <p:commandButton value="Limpiar"
                                     type="button"
                                     styleClass="btn btn-secondary"
                                     onclick="location.reload();" />
                </div>
            </h:form>
        </div>
    </div>
</h:body>
</html>
