<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>SAUAP - Registro de Docentes</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #ececec; }
        .top { background: #067a38; color: #fff; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 42px; font-weight: 800; }
        .logo { height: 68px; }
        .page { padding: 18px 20px 24px; }
        .title { text-align: center; font-size: 52px; font-weight: 700; margin: 18px 0 16px; }
        .line { border-bottom: 2px solid #5ba556; margin-bottom: 18px; }
        .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }
        .nav a { background: #1f7f3a; color: #fff; border-radius: 20px; padding: 8px 18px; text-decoration: none; font-weight: 700; }
        .nav a.active { background: #0d5e29; }
        .section-title { font-size: 44px; font-weight: 700; margin-bottom: 14px; }
        .layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; margin-bottom: 16px; }
        .field { margin-bottom: 12px; }
        .field label { display: inline-block; width: 220px; font-size: 38px; font-weight: 700; }
        .field .ui-outputlabel, .field .ghost {
            display: inline-block; width: calc(100% - 235px); min-height: 58px;
            border-radius: 28px; border: 2px solid #d8d8d8; background: #dcdcdc;
            vertical-align: middle; line-height: 58px; padding: 0 18px; font-size: 28px;
        }
        .photo { border-radius: 30px; border: 2px solid #d8d8d8; background: #d1d1d1; min-height: 360px; }
        .search { margin: 10px 0 12px; }
        .search .ui-inputfield { width: 420px !important; border-radius: 22px !important; background: #dcdcdc !important; }
        .card-list { display: grid; gap: 10px; }
        .card { background: #fff; border: 1px solid #d6d6d6; border-radius: 16px; padding: 12px 16px; }
        .name { font-size: 28px; font-weight: 700; }
        .meta { color: #444; font-size: 22px; margin-top: 4px; }
    </style>
</h:head>

<h:body>
<div class="top">
    <div class="brand">SAUAP</div>
    <h:graphicImage value="resources/uabcl.png" styleClass="logo" />
</div>

<div class="page">
    <div class="title">Registro de Docentes</div>
    <div class="line"></div>

    <div class="nav">
        <a href="asignaturas.xhtml">Asignaturas</a>
        <a class="active" href="profesores.xhtml">Profesores</a>
        <a href="asignaciones.xhtml">Asignacion materias</a>
        <a href="crearUsuarioProfesores.xhtml">Crear Usuario</a>
    </div>

    <div class="section-title">Datos Personales</div>
    <div class="layout">
        <div>
            <div class="field"><label>RFC</label><span class="ghost"></span></div>
            <div class="field"><label>Nombre</label><span class="ghost"></span></div>
            <div class="field"><label>Apellido Paterno</label><span class="ghost"></span></div>
            <div class="field"><label>Apellido Materno</label><span class="ghost"></span></div>
            <div class="field"><label>Tipo contrato</label><span class="ghost"></span></div>
        </div>
        <div class="photo"></div>
    </div>

    <h:form id="listadoProfesores">
        <p:messages id="msg" closable="true" />
        <div class="search">
            <p:inputText value="#{profesoresUI.filtro}" placeholder="Buscar por nombre o RFC" />
            <p:commandButton value="Buscar" update="@form" style="margin-left:8px" />
        </div>

        <div id="cards" class="card-list">
            <ui:repeat value="#{profesoresUI.profesoresFiltrados}" var="prof">
                <div class="card">
                    <div class="name">#{profesoresUI.obtenerNombreCompleto(prof)}</div>
                    <div class="meta">RFC: #{prof.rfc}</div>
                </div>
            </ui:repeat>
        </div>
    </h:form>
</div>
</h:body>
</html>
