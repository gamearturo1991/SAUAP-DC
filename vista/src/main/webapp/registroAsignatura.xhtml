<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>SAUAP - Registro de Asignaturas</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #fff; font-family: Arial, sans-serif; margin: 0; }
        .topbar { background: #1b6b3a; color: #fff; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
        .topbar-left { display: flex; align-items: center; gap: 24px; }
        .topbar-brand { font-weight: bold; font-size: 18px; letter-spacing: 1px; }
        .topbar-nav { display: flex; gap: 4px; }
        .nav-link { color: #cde8d4; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); color: #fff; text-decoration: none; }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .topbar-user { font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .badge-rol { background: #f0a500; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .btn-logout { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,255,255,0.3); }
        .divider { height: 3px; background: #28a745; }
        .page-title { text-align: center; font-weight: bold; font-size: 20px; margin: 20px 0 8px; }
        .title-divider { height: 2px; background: #28a745; margin: 0 20px 20px; }
        .form-area { display: flex; gap: 40px; padding: 10px 30px 20px; }
        .section { flex: 1; }
        .section-header { font-weight: bold; font-size: 14px; color: #333; margin-bottom: 12px; }
        .field-row { display: flex; align-items: center; margin-bottom: 12px; }
        .field-row label { width: 160px; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        .field-row .ui-inputfield, .field-row input { flex: 1; border: 1px solid #ccc; border-radius: 14px; padding: 5px 12px; }
        .total-row { display: flex; align-items: center; margin-top: 8px; padding: 8px 0; border-top: 1px solid #eee; }
        .total-row label { width: 160px; font-size: 14px; font-weight: bold; }
        .total-val { font-size: 18px; font-weight: bold; color: #1b6b3a; }
        .btn-area { padding: 0 30px 20px; display: flex; gap: 10px; }
        .btn-registrar { background: #1b6b3a; color: #fff; border: none; padding: 8px 28px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-registrar:hover { background: #145230; }
        .btn-limpiar { background: #bbb; color: #fff; border: none; padding: 8px 28px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .table-area { padding: 0 30px 30px; }
    </style>
</h:head>
<h:body>
    <!-- Header -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="topbar-brand">SAUAP</span>
            <nav class="topbar-nav">
                <a href="registroAsignatura.xhtml" class="nav-link active">Asignaturas</a>
                <a href="registroDocente.xhtml" class="nav-link">Docentes</a>
                <a href="asignacionAsignatura.xhtml" class="nav-link">Asignacion</a>
                <a href="consultaAsignaciones.xhtml" class="nav-link">Consulta</a>
                <a href="perfil.xhtml" class="nav-link">Perfil</a>
            </nav>
        </div>
        <div class="topbar-right">
            <div class="topbar-user">
                <span>&#128100; #{loginUI.usuarioActual.nombreUsuario}</span>
                <span class="badge-rol">#{loginUI.usuarioActual.rol}</span>
            </div>
            <h:form>
                <p:commandButton value="Cerrar sesion" styleClass="btn-logout"
                                 action="#{loginUI.logout()}" ajax="false"/>
            </h:form>
            <p:graphicImage url="resources/uabcl.png" style="height:36px;margin-left:8px;"/>
        </div>
    </div>
    <div class="divider"/>

    <h:form id="formAsignatura">
        <p:messages id="msgs" showDetail="true" closable="true" style="margin:10px 30px 0;"/>
        <div class="page-title">Registro de Asignaturas</div>
        <div class="title-divider"/>

        <div class="form-area">
            <!-- Informacion General -->
            <div class="section">
                <div class="section-header">&#x2139;&#xfe0f; Informacion General</div>
                <div class="field-row">
                    <label>Nombre</label>
                    <p:inputText value="#{asignaturaUI.nombre}" maxlength="100" required="true"
                                 requiredMessage="El nombre es obligatorio"/>
                </div>
            </div>

            <!-- Distribucion de Horas -->
            <div class="section">
                <div class="section-header">&#x23F1; Distribucion de Horas a la Semana</div>
                <div class="field-row">
                    <label>Horas Clase</label>
                    <p:inputNumber id="horasClase" value="#{asignaturaUI.numHorasClase}" min="0" max="99">
                        <p:ajax event="change" update="totalHoras" process="horasClase horasTaller horasLab"/>
                    </p:inputNumber>
                </div>
                <div class="field-row">
                    <label>Horas Taller</label>
                    <p:inputNumber id="horasTaller" value="#{asignaturaUI.numHorasTaller}" min="0" max="99">
                        <p:ajax event="change" update="totalHoras" process="horasClase horasTaller horasLab"/>
                    </p:inputNumber>
                </div>
                <div class="field-row">
                    <label>Horas Laboratorio</label>
                    <p:inputNumber id="horasLab" value="#{asignaturaUI.numHorasLaboratorio}" min="0" max="99">
                        <p:ajax event="change" update="totalHoras" process="horasClase horasTaller horasLab"/>
                    </p:inputNumber>
                </div>
                <div class="total-row">
                    <label>Total horas</label>
                    <h:panelGroup id="totalHoras">
                        <span class="total-val">
                            <h:outputText value="#{asignaturaUI.totalHoras}"/>
                        </span>
                    </h:panelGroup>
                </div>
            </div>
        </div>

        <div class="btn-area">
            <p:commandButton value="Registrar" styleClass="btn-registrar"
                             action="#{asignaturaUI.registrar()}" update="msgs tablaAsignaturas @form"/>
            <p:commandButton value="Limpiar" styleClass="btn-limpiar"
                             action="#{asignaturaUI.limpiar()}" update="@form" process="@this"/>
        </div>

        <!-- Tabla de asignaturas -->
        <div class="table-area">
            <p:dataTable id="tablaAsignaturas" value="#{asignaturaUI.asignaturas}" var="a"
                         emptyMessage="No hay asignaturas registradas"
                         styleClass="table table-bordered table-hover" style="width:100%"
                         paginator="true" rows="10">
                <p:column headerText="ID">
                    <h:outputText value="#{a.id}"/>
                </p:column>
                <p:column headerText="Nombre">
                    <h:outputText value="#{a.nombre}"/>
                </p:column>
                <p:column headerText="Hrs Clase">
                    <h:outputText value="#{a.numHorasClase}"/>
                </p:column>
                <p:column headerText="Hrs Taller">
                    <h:outputText value="#{a.numHorasTaller}"/>
                </p:column>
                <p:column headerText="Hrs Lab">
                    <h:outputText value="#{a.numHorasLaboratorio}"/>
                </p:column>
                <p:column headerText="Total">
                    <h:outputText value="#{a.numHorasClase + a.numHorasTaller + a.numHorasLaboratorio}"/>
                </p:column>
            </p:dataTable>
        </div>
    </h:form>
</h:body>
</html>
